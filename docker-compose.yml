# Единая сборка из КОРНЯ репозитория:  docker compose up -d --build
# Поднимает postgres + redis + ollama + api + web. nginx — на хост-машине
# (пример: infra/nginx/embeding-api.conf), проксирует на api и web.

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-embeding}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-embeding}
      POSTGRES_DB: ${POSTGRES_DB:-embeding}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-embeding}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama:/root/.ollama
    ports:
      - "127.0.0.1:${OLLAMA_PORT:-11434}:11434"
    # GPU (NVIDIA): раскомментировать + установить nvidia-container-toolkit
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_started
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-embeding}:${POSTGRES_PASSWORD:-embeding}@postgres:5432/${POSTGRES_DB:-embeding}?schema=public
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_TIMEOUT_MS: ${OLLAMA_TIMEOUT_MS:-120000}
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:-5m}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CHAT_CONCURRENCY: ${CHAT_CONCURRENCY:-1}
      EMBED_CONCURRENCY: ${EMBED_CONCURRENCY:-3}
      MSGPACKR_NATIVE_ACCELERATION_DISABLED: "true"
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?задай JWT_ACCESS_SECRET в .env}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?задай JWT_REFRESH_SECRET в .env}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-15m}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-30d}
      APIKEY_HMAC_SECRET: ${APIKEY_HMAC_SECRET:?задай APIKEY_HMAC_SECRET в .env}
      WEB_ORIGIN: ${WEB_ORIGIN:-http://localhost:8080}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-}
      HTTP_BODY_LIMIT: ${HTTP_BODY_LIMIT:-25mb}
      MAX_EMBED_INPUT_ITEMS: ${MAX_EMBED_INPUT_ITEMS:-2048}
      MAX_EMBED_INPUT_CHARS: ${MAX_EMBED_INPUT_CHARS:-1000000}
      SUPERADMIN_EMAIL: ${SUPERADMIN_EMAIL:?задай SUPERADMIN_EMAIL в .env}
      SUPERADMIN_PASSWORD: ${SUPERADMIN_PASSWORD:?задай SUPERADMIN_PASSWORD в .env}
    ports:
      - "127.0.0.1:${API_PORT:-3000}:3000"

  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
      args:
        # URL API, как его видит БРАУЗЕР. Пусто = same-origin (когда хостовый nginx
        # роутит / → web и /v1,/auth,/admin,/keys → api). Для прямого доступа задать,
        # напр. WAKU_PUBLIC_API_URL=http://localhost:3000 в .env.
        WAKU_PUBLIC_API_URL: ${WAKU_PUBLIC_API_URL:-}
    restart: unless-stopped
    depends_on:
      - api
    environment:
      PORT: 8080
    ports:
      - "127.0.0.1:${WEB_PORT:-8080}:8080"

volumes:
  pgdata:
  redis:
  ollama:
