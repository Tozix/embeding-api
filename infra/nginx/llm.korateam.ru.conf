# Хостовый nginx для llm.korateam.ru (НЕ в docker-compose).
# API-пути → api-контейнер (127.0.0.1:3000), всё остальное → web (127.0.0.1:8080).
# TLS: Let's Encrypt / certbot. Конфиг ждёт сертификаты в /etc/letsencrypt/live/llm.korateam.ru/.
# Если в .env переопределены API_PORT/WEB_PORT — поправь порты в upstream ниже.

upstream embeding_api { server 127.0.0.1:3000; }
upstream embeding_web { server 127.0.0.1:8080; }

# /admin/* — это И API (JSON по fetch с Bearer), И SPA-страницы админки (документы при
# обновлении/прямой ссылке). По пути их не различить, поэтому делим по Accept:
# навигация браузера (text/html) → фронт (SPA), XHR/fetch/SSE (*/*) → API.
map $http_accept $admin_upstream {
    default       http://127.0.0.1:3000;  # = embeding_api
    "~*text/html" http://127.0.0.1:8080;  # = embeding_web
}

# --- HTTP: ACME-челлендж (выпуск/продление) + редирект на HTTPS ---
server {
    listen 80;
    listen [::]:80;
    server_name llm.korateam.ru;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

# --- HTTPS ---
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on; # nginx >= 1.25.1; для старее замените на `listen 443 ssl http2;` выше
    server_name llm.korateam.ru;

    ssl_certificate     /etc/letsencrypt/live/llm.korateam.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/llm.korateam.ru/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    add_header Strict-Transport-Security "max-age=31536000" always;

    client_max_body_size 25m; # большие батчи эмбеддингов (= HTTP_BODY_LIMIT)

    # --- Чистые API-префиксы (без коллизии с SPA-роутами) → api-контейнер ---
    # `me` — кабинетные ручки песочницы/чата (/me/playground/*). Без него фронт-роут /me/*
    # проваливается во фронт (Waku) и отдаёт 404 → в кабинете «нет ключей».
    location ~ ^/(v1|auth|keys|me|health|reference|openapi\.json)(/|$) {
        proxy_pass http://embeding_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE: стриминг /v1/chat/completions — без буферизации
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 1h;
        chunked_transfer_encoding on;
    }

    # --- /admin/* раздваивается по Accept (см. map): документ → SPA-страница админки,
    # fetch/SSE (в т.ч. /admin/analytics/live) → API. Иначе обновление/прямая ссылка на
    # админ-страницу отдаёт сырой JSON/401 вместо интерфейса. ---
    location ~ ^/admin(/|$) {
        proxy_pass $admin_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 1h;
        chunked_transfer_encoding on;
    }

    # --- Фронтенд (Waku) → web-контейнер ---
    location / {
        proxy_pass http://embeding_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
