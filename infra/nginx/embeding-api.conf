# Пример хостового nginx (живёт на хост-машине, НЕ в docker-compose).
# Проксирует на контейнер API, слушающий 127.0.0.1:3000.
# Установить: положить в /etc/nginx/sites-available/ и слинковать в sites-enabled/.

upstream embeding_api {
    server 127.0.0.1:3000;
}

server {
    listen 80;
    server_name api.example.com;

    # TLS терминируется здесь (раскомментировать после выпуска сертификата):
    # listen 443 ssl;
    # ssl_certificate     /etc/letsencrypt/live/api.example.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/api.example.com/privkey.pem;

    client_max_body_size 25m;

    location / {
        proxy_pass http://embeding_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Стриминг chat-комплишенов (SSE): отключаем буферизацию и держим соединение
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 1h;
        chunked_transfer_encoding on;
    }
}
