# Пример хостового nginx (на хост-машине, НЕ в docker-compose).
# Единый вход → роутит на контейнеры: / → web (8080), API-пути → api (3000).
# При таком (same-origin) доступе фронт собирается с пустым WAKU_PUBLIC_API_URL.

upstream embeding_api {
    server 127.0.0.1:3000;
}
upstream embeding_web {
    server 127.0.0.1:8080;
}

server {
    listen 80;
    server_name api.example.com;

    # TLS терминируется здесь (раскомментировать после выпуска сертификата):
    # listen 443 ssl;
    # ssl_certificate     /etc/letsencrypt/live/api.example.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/api.example.com/privkey.pem;

    client_max_body_size 25m;

    # API-префиксы → api-контейнер. SPA-роуты (вкл. админку /app/admin/*) сюда НЕ попадают —
    # они под /app/* и уходят во фронт ниже. `me` — ручки песочницы/чата (/me/playground/*).
    location ~ ^/(v1|auth|admin|keys|me|health|reference|openapi\.json)(/|$) {
        proxy_pass http://embeding_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Стриминг chat-комплишенов и live-SSE (/admin/analytics/live): без буферизации
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 1h;
        chunked_transfer_encoding on;
    }

    # Всё остальное (вкл. /app/* и /app/admin/*) → фронтенд (Waku)
    location / {
        proxy_pass http://embeding_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
